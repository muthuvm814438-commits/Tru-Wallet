<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Truwallet</title>

    <link rel="stylesheet" href="https://tru-wallet.net/css/ply-app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
    <link rel="shortcut icon" href="https://tru-wallet.net/images/logo/truwallet-logo.png">
    
    <style>
        .reset-box {
            background: #11151c;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            margin: 100px auto;
        }
        body {
            background-color: #0c0f14;
            color: white;
        }
        .form-control {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white !important;
            height: 50px;
            border-radius: 10px;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.08);
            border-color: #2463f1;
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="reset-box">
            <div class="text-center mb-5">
                <img src="https://tru-wallet.net/images/logo/truewallet-logo-black.png" alt="Logo" width="150" class="mb-4">
                <h3 class="text-white">New Password</h3>
                <p class="text-white-50">Enter the OTP sent to your email and your new password.</p>
            </div>

            <form id="reset-password-form">
                <div class="form-group mb-3">
                    <label class="mb-2">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="your@email.com" required readonly>
                </div>
                <div class="form-group mb-3">
                    <label class="mb-2">OTP (from email)</label>
                    <input type="text" id="otp" class="form-control" placeholder="Enter 6-digit OTP" required maxlength="6">
                </div>
                <div class="form-group mb-3">
                    <label class="mb-2">New Password</label>
                    <input type="password" id="new-password" class="form-control" placeholder="Min. 8 characters" required minlength="8">
                </div>
                <div class="form-group mb-4">
                    <label class="mb-2">Confirm New Password</label>
                    <input type="password" id="confirm-password" class="form-control" placeholder="Repeat new password" required minlength="8">
                </div>

                <button type="submit" class="btn-action w-100" id="reset-btn">Reset Password</button>
                <div id="status" class="mt-3 text-center"></div>
                
                <div class="text-center mt-4">
                    <a href="index.html" class="text-white-50 small"><i class="fa fa-arrow-left me-2"></i> Back to Login</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://tru-wallet.net/js/jquery.min.js"></script>
    <script src="insforge-config.js"></script>
    <script type="module">
        import { createClient } from "https://cdn.jsdelivr.net/npm/@insforge/sdk@latest/+esm";
        window.insforgeClient = createClient({ baseUrl: window.INSFORGE_URL, anonKey: window.INSFORGE_ANON_KEY });
    </script>

    <script>
        $(() => {
            // Get email from URL
            const urlParams = new URLSearchParams(window.location.search);
            const emailParam = urlParams.get('email');
            if (emailParam) {
                $('#email').val(emailParam);
            }

            $('#reset-password-form').submit(async function(e) {
                e.preventDefault();
                const email = $('#email').val();
                const otp = $('#otp').val();
                const newPassword = $('#new-password').val();
                const confirmPassword = $('#confirm-password').val();
                const btn = $('#reset-btn');
                const statusBox = $('#status');

                if (newPassword !== confirmPassword) {
                    statusBox.html('<p class="text-danger">Passwords do not match!</p>');
                    return;
                }

                btn.attr('disabled', true).html('Updating <i class="fa fa-circle-notch fa-spin"></i>');
                statusBox.html('');

                try {
                    if(!window.insforgeClient) throw new Error("Client not ready");
                    
                    const { data, error } = await window.insforgeClient.auth.resetPassword({
                        newPassword: newPassword,
                        otp: otp
                    });

                    if (error) throw error;

                    statusBox.html('<p class="text-success">Password updated! Redirecting to login...</p>');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 3000);
                } catch (err) {
                    statusBox.html(`<p class="text-danger">Error: ${err.message}</p>`);
                    btn.attr('disabled', false).html('Reset Password');
                }
            });
        });
    </script>
</body>
</html>
