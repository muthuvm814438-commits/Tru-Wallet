<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Unavailable - Tru-Wallet</title>
    <!-- Use standard fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #2463f1 0%, #6837f1 100%);
            --dark-bg: #0b0e11;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-white);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;
        }

        /* Animated background particles */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(36, 99, 241, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(104, 55, 241, 0.15) 0%, transparent 50%);
            z-index: -1;
        }

        .container {
            max-width: 600px;
            padding: 40px 20px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-box {
            font-size: 80px;
            margin-bottom: 24px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 18px;
            color: var(--text-muted);
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .qr-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease;
        }

        .qr-card:hover {
            transform: translateY(-5px);
        }

        .qr-image {
            width: 250px;
            height: auto;
            border-radius: 12px;
            margin-bottom: 20px;
            background: #fff;
            padding: 10px;
        }

        .insta-handle {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-white);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .insta-handle i {
            color: #E1306C;
            font-size: 24px;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 32px;
            background: var(--primary-gradient);
            color: white;
            text-decoration: none;
            border-radius: 16px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(36, 99, 241, 0.3);
        }

        .btn-back:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(36, 99, 241, 0.4);
        }

        .social-cta {
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .small-text {
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    
    <div class="container">
        <div class="icon-box">
            <i class="fa fa-screwdriver-wrench"></i>
        </div>
        <h1>Sorry For Inconvenience !!!!!</h1>
        <p>This service is currently undergoing professional maintenance to bring you the best experience. Stay tuned!</p>

        <div class="qr-card">
            <span class="small-text">Direct Contact Support</span>
            <img src="insta-qr.png" alt="Instagram QR Code" class="qr-image">
            <a href="https://instagram.com/TRU_WALLET" target="_blank" class="insta-handle">
                <i class="fab fa-instagram"></i>
                @TRU_WALLET
            </a>
        </div>

        <a href="dashboard.html" class="btn-back">
            <i class="fa fa-arrow-left"></i>
            Back to Dashboard
        </a>

        <div class="social-cta">
            <p class="small-text" style="margin-bottom: 8px;">For manual assistance &amp; deposits</p>
            <p style="font-size: 14px; color: var(--text-muted);">Please scan the QR code above or message us directly on Instagram.</p>
        </div>
    </div>
</body>
</html>
